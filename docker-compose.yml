services:
  db:
    image: postgres:16-alpine
    container_name: hotelerp-db
    environment:
      POSTGRES_DB: hotelerp
      POSTGRES_USER: hotelerp
      POSTGRES_PASSWORD: hotelerp
    ports:
      - "5433:5432"
    volumes:
      - hotelerp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelerp -d hotelerp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local SMTP catcher — captures booking-confirmation emails in dev.
  # Web UI: http://localhost:8025  |  SMTP: localhost:1025
  mailpit:
    image: axllent/mailpit:latest
    container_name: hotelerp-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500

volumes:
  hotelerp_pgdata:
