spring:
  application:
    name: hotel-erp
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${PORT:8080}
  error:
    include-message: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  jwt:
    # HS256 secret (Base64). Override in prod via APP_JWT_SECRET. This dev default is >= 256 bits.
    secret: ${APP_JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTAxMjM0NTY3ODk=}
    access-token-ttl: ${APP_JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${APP_JWT_REFRESH_TTL:P7D}
    issuer: hotel-erp
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}
  mail:
    from: ${APP_MAIL_FROM:no-reply@hotel-erp.local}
    enabled: ${APP_MAIL_ENABLED:false}
