spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/hotelerp}
    username: ${DB_USERNAME:hotelerp}
    password: ${DB_PASSWORD:hotelerp}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000
  flyway:
    # dev applies demo seed data on top of reference data
    locations: classpath:db/migration,classpath:db/dev
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.ayches.hotelerp: DEBUG
    org.springframework.security: INFO
